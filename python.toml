# Tasks

## Format

["format:black"]
description = "Format Python code with Black"
run = "black {{ env.EXTRA_PATHS }} src tests"

["format:ruff"]
description = "Lint Python with Ruff and auto-fix violations"
run = "ruff check --fix {{ env.EXTRA_PATHS }} src tests"

["format:taplo"]
description = "Format TOML files"
run = "taplo format --config=.taplo.toml"

[format]
description = "Run all formatters"
run = [{ task = "format:taplo" }, { task = "format:black" }, { task = "format:ruff" }]

## Lint

["lint:codespell"]
description = "Find typos in source and test files"
run = "codespell {{ env.EXTRA_PATHS }} src tests/unit tests/integration"

["lint:import-linter"]
description = "Enforce GLIMPSE layer import rules"
run = "lint-imports --config=pyproject.toml"

["lint:mypy"]
description = "Type-check Python source with mypy"
run = "mypy src"
env = { _.file = '.env.test' }

["lint:_pylint"]
description = "Run Pylint on source and tests (duplicate-code disabled for tests)"
run = ["pylint"]

["lint:pylint"]
run = [
    { task = "lint:_pylint", args = ["{{ env.EXTRA_PATHS }}", "src"] },
    { task = "lint:_pylint", args = ["--disable=duplicate-code", "tests"] },
]

["lint:ruff"]
run = ["ruff check --no-fix {{ env.EXTRA_PATHS }} src tests"]

["lint:taplo"]
description = "Format TOML files"
run = "taplo lint --config=.taplo.toml"

["lint:vulture"]
description = "Find dead Python code"
run = "! vulture --config=pyproject.toml src | grep -v unused.variable"

["lint:py"]
description = "Run all linters"
depends = [
    { task = "lint:pylint" },
    { task = "lint:mypy" },
    { task = "lint:vulture" },
    { task = "format:black", args = ["--check"] },
    { task = "lint:codespell" },
    { task = "lint:import-linter" },
    { task = "lint:ruff" },
    { task = "lint:taplo" },
]

## Dependencies

["update:py"]
description = "Update all dependencies: mise tools, pip, Poetry packages"
run = [
    "mise upgrade",
    "pip install -U pip",
    "poetry update",
    "deptry src tests",
    "pip-audit .",
    "poetry show -o",
]

## Tests

### Python tests

["test:unit"]
description = "Run unit tests"
run = "pytest tests/unit"
env = { _.file = '.env.test' }

["test:unit:cov"]
description = "Run unit tests"
run = "pytest tests/unit --cov=tests.unit --cov={{env.PACKAGE}}"
env = { _.file = '.env.test' }

["test:int:cov:diff"]
description = "Show test coverage of integration tests for lines changed since main"
run = [
    "pytest tests/integration --cov={{env.PACKAGE}}.gates --cov={{env.PACKAGE}}.links --cov={{env.PACKAGE}}.adapters.web --cov=src/{{env.PACKAGE}}/templates/",
    "coverage xml",
    "diff-cover coverage.xml --compare-branch=main",
]
env = { _.file = '.env.test' }

["test:int"]
description = "Run integration tests"
run = "pytest tests/integration"
env = { _.file = '.env.test' }

["test:int:cov"]
description = "Run integration tests"
run = "pytest tests/integration --cov=tests.integration --cov={{env.PACKAGE}}"
env = { _.file = '.env.test' }

["test:unit:cov:diff"]
description = "Show test coverage of unit tests for lines changed since main"
run = [
    "pytest tests/unit --cov={{env.PACKAGE}}.mills",
    "coverage xml",
    "diff-cover coverage.xml --compare-branch=main",
]
env = { _.file = '.env.test' }

["test:py"]
description = "Run all Python tests"
run = "pytest tests/integration tests/unit"
env = { _.file = '.env.test', COVERAGE_FILE = "{{ config_root }}/.coverage.unit" }

["test:py:cov"]
description = "Run all Python tests"
run = "pytest tests/integration tests/unit --cov"
env = { _.file = '.env.test', COVERAGE_FILE = "{{ config_root }}/.coverage.unit" }

## Complex

[shitcheck]
description = "Flag suspicious additions vs main (file:line; tests skip Any): noqa, Any, cast"
run = [
    "scripts/shitcheck.sh 'request.di.uow|nosec|noqa|type: ignore|Any|pylint|pragma|cast\\(|(^|[^[:alnum:]_])object([^[:alnum:]_]|$)' ':(glob)src/**/*.py'",
    "scripts/shitcheck.sh 'nosec|noqa|pylint|pragma|\\.skip$|\\.xfail$|ANY' ':(glob)tests/**/*.py'",
]

["check:py"]
run = [{ task = "format" }, { task = "lint" }, { task = "test:py" }]

["check:slow:py"]
run = [
    { task = "format:taplo" },
    { task = "format:black" },
    { task = "format:ruff" },
    { task = "lint:ruff" },
    { task = "lint:import-linter" },
    { task = "lint:codespell" },
    { task = "lint:vulture" },
    { task = "lint:mypy" },
    { task = "lint:pylint" },
]
